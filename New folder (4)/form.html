<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Registration Form</legend>
        </fieldset>
        
            <label for="fname">Full Name:</label><br>
            <input class="in" type="First Name" id="fname" placeholder="Your Name" ><br>
            <label for="ff">F/Name:</label><br>
            <input class="in" type="First Name" id="ff" placeholder="Your F/name" ><br>
            <label for="fa">Physical Address:</label><br>
            <input class="in" type="First Name" id="fa" placeholder="Your Adress" ><br>
            <label for="E-m">E-mail:</label><br>
            <input class="in" type="email" id="E-m" placeholder="Your E-mail " ><br>
            <label for="cn">Contact Number:</label><br>
            <input class="in" type="First Name" id="cn" placeholder="Your Number" ><br>
            <label for="df">Date of Birth:</label><br>
            <input class="in" type="date" id="df" placeholder="Date of Birth" ><br>
            <label for="fp">Password:</label><br>
            <input class="in" type="password" id="fp" placeholder="Your Password" ><br>
            <label for="con">Confirm password:</label><br>
            <input class="in" type="password" id="con" placeholder="Confirm it" > <br><br>
            <label>Gender:</label>
            <select style="width: 100px;"> 
                <option  class="op">Male</option>
                <option class="op">Female</option>
                <option class="op">Other</option>
            </select> <br><br>
          <div class="button">
            <div>
                <button type="submit">submit</button>
            </div>
            <div>
                <input type="checkbox">
            </div>
          
          </div>
        
    </form>
</body>
</html>
